name: fab-inspector-cli-clientsecret

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Fab Inspector release tag (for example: v3.3.0) or 'latest'"
        required: false
        default: "latest"

jobs:
  run-fab-inspector-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v5

      - name: Download and install Fab Inspector CLI
        uses: ./.github/actions/download-fab-inspector
        with:
          version: ${{ github.event.inputs.version || 'latest' }}

      - name: Run Fab Inspector CLI (service principal auth)
        shell: bash
        run: |
          fab-inspector \
            -fabricitem ./src \
            -rules ./fab-inspector-rules/sample-report-rules.json \
            -authmethod clientsecret \
            -clientid "${{ secrets.FABRIC_CLIENT_ID }}" \
            -tenantid "${{ secrets.FABRIC_TENANT_ID }}" \
            -clientsecret "${{ secrets.FABRIC_CLIENT_SECRET }}" \
            -output "${{ vars.ONELAKE_OUTPUT_FOLDER }}" \
            -formats "GitHub,JSON"
