name: fab-inspector-docker-clientsecret
  
on: 
  workflow_dispatch:

jobs:
  run-fab-inspector-docker:    
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v5

      - name: Run base rules on reports (service principal auth)
        run: |
          docker pull ghcr.io/natvang/fab-inspector:latest
          docker run --rm \
            -v "${{ github.workspace }}/src:/src" \
            -v "${{ github.workspace }}/fab-inspector-rules:/rules" \
            ghcr.io/natvang/fab-inspector:latest \
            -fabricitem /src \
            -rules /rules/sample-report-rules.json \
            -authmethod clientsecret \
            -clientid "${{ secrets.FABRIC_CLIENT_ID }}" \
            -tenantid "${{ secrets.FABRIC_TENANT_ID }}" \
            -clientsecret "${{ secrets.FABRIC_CLIENT_SECRET }}" \
            -output "${{ vars.ONELAKE_OUTPUT_FOLDER }}" \
            -formats "GitHub,JSON"
